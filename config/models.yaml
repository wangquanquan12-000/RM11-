# 可选模型列表，供工作台各模块（如生成用例）使用；新增模型只改此处
# key: 模型 ID（如环境变量 GEMINI_MODEL）；label: 下拉框展示名；default: 是否默认选中
# 注：gemini-1.5-pro / gemini-1.5-flash 已于 2025-04 弃用，请使用 2.0/2.5 系列
models:
  - key: gemini-2.5-flash-lite
    label: "2.5 Flash-Lite（免费额度较高，推荐）"
    default: true
  - key: gemini-2.5-flash
    label: "2.5 Flash（付费/免费皆可）"
    default: false
  - key: gemini-2.5-pro
    label: "2.5 Pro（原 1.5 Pro 替代，质量高）"
    default: false
