# 拉取时自动过滤非产品需求文档 - 仅保留 PRD
# 标题或内容匹配下列任一模式时，该文档会被排除，不导入项目记忆
# 可自行增删改，修改后刷新即可生效

exclude_title_patterns:
  - "测试用例|^用例$|^TC-|TC\\d"
  - "UI走查|UI 走查|走查清单|走查报告"
  - "进度汇总|进度周报|周报|日报|月报"
  - "会议纪要|会议记录|会议备忘"
  - "bug|缺陷|issue|问题单"
  - "复盘|总结报告"
  - "评审记录|评审结论"
  - "changelog|更新日志"
  - "测试报告|测试结果|测试通过"

# 内容排除信号（文档前 1500 字内出现则排除）
exclude_content_signals:
  - "用例ID|用例 id"
  - "预期结果.*操作步骤|操作步骤.*预期结果"
  - "通过.*失败|PASS.*FAIL"
  - "走查项|检查项"
